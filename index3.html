<!DOCTYPE html>
<html>
<head>
  <title>Author : Gaurav Kumar</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <style>
    /* Custom CSS styles */
    body {
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(45deg, #2e3192, #1bffff);
      color: #333;
      position: relative;
      overflow: hidden;
    }
    body::after {
      content: "";
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.5);
      animation: bubble-animation 3s linear infinite;
    }
    @keyframes bubble-animation {
      0% { top: -50px; opacity: 0; }
      50% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 36px;
      margin-bottom: 30px;
      color: #0070c0;
      text-align: center;
    }
    form {
      margin-top: 20px;
    }
    .form-group label {
      font-weight: bold;
    }
    .btn-primary {
      background-color: #0070c0;
      border-color: #0070c0;
      transition: background-color 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #00447c;
      border-color: #00447c;
    }
    .form-control:focus {
      border-color: #0070c0;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <form method="post" onsubmit="getValueFromEditor(); return false;">
      <div class="form-group">
        <label for="editor">Content:</label>
        <textarea id="editor" name="editor" class="form-control"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>

  <script src="https://cdn.ckeditor.com/4.16.2/standard/ckeditor.js"></script>
  <script>
    // Initialize CKEditor
    CKEDITOR.replace('editor');

    // Get the editor's value
    function getValueFromEditor() {
      var editorData = CKEDITOR.instances.editor.getData();
      console.log(editorData);
    }
  </script>
</body>
</html>
